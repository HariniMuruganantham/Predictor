apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: predictor
  template:
    metadata:
      labels:
        app: predictor
    spec:
      containers:
      - name: predictor
        image: predictor:v0.1
        imagePullPolicy: Never   # use the local image built inside minikube's Docker env, don't try to pull from a registry
        ports:
        - containerPort: 5000
        env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: predictor-config
              key: LOG_LEVEL
