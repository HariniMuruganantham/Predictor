name: Build and Push Predictor

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/predictor:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/predictor:sha-${{ steps.vars.outputs.short_sha }}

  deploy:
    if: ${{ runner.environment == 'self-hosted' }}
    needs: build
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Update Deployment
        run: |
          kubectl set image deployment/predictor predictor=${{ secrets.DOCKERHUB_USERNAME }}/predictor:sha-${{ needs.build.outputs.short_sha }}
          kubectl rollout status deployment/predictor